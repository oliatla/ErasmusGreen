<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="GREEN">
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="#059669"/>

  <!-- Leaf body -->
  <path d="M 14 50
           C 14 28, 26 14, 50 14
           C 50 38, 36 50, 14 50 Z"
        fill="#ffffff"/>

  <!-- Stem / midrib -->
  <path d="M 18 46 L 46 18"
        stroke="#059669"
        stroke-width="2.5"
        stroke-linecap="round"
        fill="none"/>

  <!-- Side veins -->
  <path d="M 26 38 L 32 32 M 32 32 L 38 26"
        stroke="#059669"
        stroke-width="1.4"
        stroke-linecap="round"
        fill="none"
        opacity=".55"/>

  <!-- Small circle accent (echoes the GREEN logo motif) -->
  <circle cx="46" cy="18" r="3.5" fill="#fef08a" stroke="#059669" stroke-width="1.4"/>
</svg>
