<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" role="img" aria-label="Salernið í skólanum">
  <rect width="300" height="400" fill="#e8f1f5"/>
  <rect x="6" y="6" width="288" height="388" fill="none" stroke="#0369a1" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- room outline -->
  <rect x="40" y="60" width="220" height="280" fill="#f7fafc" stroke="#64748b" stroke-width="1.5"/>

  <!-- floor pattern -->
  <line x1="40"  y1="300" x2="260" y2="300" stroke="#94a3b8" stroke-width=".7"/>
  <line x1="80"  y1="60"  x2="80"  y2="340" stroke="#cbd5e1" stroke-width=".5"/>
  <line x1="150" y1="60"  x2="150" y2="340" stroke="#cbd5e1" stroke-width=".5"/>
  <line x1="220" y1="60"  x2="220" y2="340" stroke="#cbd5e1" stroke-width=".5"/>

  <!-- sink 1 -->
  <ellipse cx="105" cy="170" rx="22" ry="12" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <rect x="100" y="140" width="10" height="30" fill="#64748b"/>
  <circle cx="105" cy="143" r="3" fill="#dc2626"/>

  <!-- sink 2 -->
  <ellipse cx="195" cy="170" rx="22" ry="12" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <rect x="190" y="140" width="10" height="30" fill="#64748b"/>
  <circle cx="195" cy="143" r="3" fill="#dc2626"/>

  <!-- mirror above -->
  <rect x="75" y="80" width="60" height="40" fill="#cffafe" stroke="#475569" stroke-width="1"/>
  <rect x="165" y="80" width="60" height="40" fill="#cffafe" stroke="#475569" stroke-width="1"/>

  <!-- dripping water hint -->
  <text x="150" y="245" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#0369a1">200 nemendur × 3 þvottir</text>
  <text x="150" y="265" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#0369a1">= 600 þvottir / dag</text>

  <text x="150" y="385" text-anchor="middle" font-family="sans-serif" font-size="13" font-style="italic" fill="#0369a1">[ Mynd: skólasalerni ]</text>
</svg>
