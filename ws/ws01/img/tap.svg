<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" role="img" aria-label="Krani með dalli undir">
  <!-- background -->
  <rect width="300" height="400" fill="#e6f1da"/>
  <!-- frame -->
  <rect x="6" y="6" width="288" height="388" fill="none" stroke="#2e7d4f" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- wall -->
  <rect x="40" y="40" width="220" height="220" fill="#f5f0e6"/>
  <line x1="40" y1="260" x2="260" y2="260" stroke="#444" stroke-width="2"/>

  <!-- tap -->
  <rect x="135" y="60" width="30" height="50" fill="#9ca3af" rx="3"/>
  <rect x="120" y="100" width="60" height="14" fill="#6b7280" rx="3"/>
  <rect x="142" y="114" width="16" height="40" fill="#6b7280"/>

  <!-- water stream -->
  <path d="M 150 154 Q 148 175, 150 200 Q 152 220, 150 240" stroke="#3b82f6" stroke-width="3" fill="none" stroke-dasharray="2 3"/>

  <!-- bucket (500 ml) -->
  <path d="M 115 240 L 185 240 L 175 295 L 125 295 Z" fill="#fbbf24" stroke="#92400e" stroke-width="2"/>
  <ellipse cx="150" cy="240" rx="35" ry="6" fill="#fcd34d" stroke="#92400e" stroke-width="1.5"/>
  <text x="150" y="275" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#92400e">500 ml</text>

  <!-- stopwatch -->
  <circle cx="50" cy="320" r="22" fill="#1f2937" stroke="#111" stroke-width="2"/>
  <circle cx="50" cy="320" r="17" fill="#fff"/>
  <line x1="50" y1="320" x2="50" y2="307" stroke="#dc2626" stroke-width="2"/>
  <line x1="50" y1="320" x2="60" y2="320" stroke="#111" stroke-width="1.5"/>
  <text x="50" y="360" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#444">stopper</text>

  <!-- label -->
  <text x="150" y="380" text-anchor="middle" font-family="sans-serif" font-size="13" font-style="italic" fill="#2e7d4f">[ Mynd: mæling á rennsli ]</text>
</svg>
