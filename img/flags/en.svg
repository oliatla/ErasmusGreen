<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 36" role="img" aria-label="United Kingdom">
  <clipPath id="uk-clip"><rect width="60" height="36"/></clipPath>
  <g clip-path="url(#uk-clip)">
    <rect width="60" height="36" fill="#012169"/>
    <!-- White diagonals -->
    <path d="M0 0 L60 36 M60 0 L0 36" stroke="#fff" stroke-width="7"/>
    <!-- Red diagonals (offset to one side of each white diagonal — gives the Saint Patrick effect) -->
    <path d="M0 0 L30 18 L60 0 M60 36 L30 18 L0 36" stroke="#fff" stroke-width="7"/>
    <path d="M0 0 L60 36 M60 0 L0 36" stroke="#c8102e" stroke-width="2.5"/>
    <!-- White cross -->
    <path d="M30 0 V36 M0 18 H60" stroke="#fff" stroke-width="10"/>
    <!-- Red cross -->
    <path d="M30 0 V36 M0 18 H60" stroke="#c8102e" stroke-width="6"/>
  </g>
</svg>
